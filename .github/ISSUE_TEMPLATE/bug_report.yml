name: Bug report
description: Report something that is broken or behaves incorrectly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the
        sections below. Including the output of `autotrainer doctor` and
        `autotrainer info` helps us reproduce the issue quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps or a short script that triggers the bug.
        A reproducible example is the fastest path to a fix.
      placeholder: |
        1. Run `autotrainer run train.py`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: autotrainer-version
    attributes:
      label: autotrainer version
      description: Output of `python -c "import autotrainer; print(autotrainer.__version__)"`.
      placeholder: "0.11.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: |
        Paste the output of `autotrainer doctor` and `autotrainer info` here.
        This captures the detected mode, GPUs, SLURM config, and installed
        frameworks.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend / framework
      description: Which backend were you using?
      options:
        - PyTorch
        - TensorFlow / Keras
        - scikit-learn
        - XGBoost / LightGBM
        - Not framework-specific
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: The full error traceback or relevant log output.
      render: shell
