name: Feature request
description: Suggest a new feature or an improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's currently hard or impossible?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to happen. An API sketch or example helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
  - type: dropdown
    id: backend
    attributes:
      label: Backend / framework
      description: Which backend would this affect?
      options:
        - PyTorch
        - TensorFlow / Keras
        - scikit-learn
        - XGBoost / LightGBM
        - All / framework-agnostic
        - Not sure
    validations:
      required: true
