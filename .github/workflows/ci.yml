name: CI
on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv pip install ruff
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "${{ matrix.python }}"
      - run: uv pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: uv run pytest tests/ -v -m "not cuda"
      # Coverage XML is uploaded so coverage trends are inspectable without a
      # third-party account. pytest already produces it via addopts.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore

  # GPU tests run on a self-hosted runner (your RTX 5070 box, registered with
  # the `self-hosted` and `gpu` labels). This is what catches the class of
  # CUDA-path bug that CPU CI cannot - the device_count() crash, the
  # _pretend_cuda stub defect, and the /nfs PermissionError were all found
  # by running on a real GPU, not by CPU CI.
  #
  # IMPORTANT: until a runner with the `self-hosted,gpu` labels is registered
  # (see RUNNER_SETUP.md), this job shows as "queued" and never runs. That is
  # intentional - it surfaces "you haven't finished setup" rather than
  # silently skipping GPU coverage. The job is NOT required (no branch
  # protection rule includes it), so it does not block merges.
  #
  # Runner setup (one-time): see RUNNER_SETUP.md.
  test-cuda:
    runs-on: [self-hosted, gpu]
    # Cap the job's *execution* time. This does NOT cover the "queued
    # forever because the runner is offline" case (the timeout only starts
    # counting once a runner picks the job up), but it turns an
    # in-execution hang (driver crash, stuck NCCL collective, deadlocked
    # distributed test) from "stuck running silently" into "failed after
    # 30min" - a visible signal instead of an invisible one.
    timeout-minutes: 30
    env:
      PYTHON: C:\Python313\python.exe
    steps:
      - uses: actions/checkout@v4
      # Create a venv in the runner's persistent work dir. The system Python
      # at C:\Python313 is uv-managed and carries the PEP 668 EXTERNALLY-
      # MANAGED marker, so installing straight into it fails with
      # 'externally-managed-environment'. A venv is the right pattern anyway
      # - isolates autotrainer + torch from the system Python. The venv is
      # outside _work so it survives across runs (the 2.5GB torch wheel
      # would re-download every run otherwise).
      #
      # All subsequent steps prepend D:\runner-venv\Scripts to PATH so plain
      # `python` and `pip` resolve there.
      - name: Create persistent venv and add to PATH
        shell: pwsh
        run: |
          if (-not (Test-Path D:\runner-venv\Scripts\python.exe)) {
            & "$env:PYTHON" -m venv D:\runner-venv
          }
          & D:\runner-venv\Scripts\python.exe -m pip install --upgrade pip
          Add-Content -Path $env:GITHUB_PATH -Value "D:\runner-venv\Scripts"
      # Install the base extras WITHOUT torch first, then the CUDA-enabled torch wheel
      # from the PyTorch index.
      - name: Install autotrainer (no torch)
        run: python -m pip install -e ".[dev,sklearn,boosting,tune]"
      - name: Install cu128 nightly torch
        run: python -m pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cu128
      # Sanity: confirm the runner actually has a visible CUDA device before
      # running the suite.
      - name: GPU sanity check
        run: |
          python -c "import torch; assert torch.cuda.is_available() and torch.cuda.device_count() > 0, 'No CUDA GPU visible - check CUDA_VISIBLE_DEVICES and driver'; print(f'GPU OK: {torch.cuda.get_device_name(0)} (capability {torch.cuda.get_device_capability(0)})')"
      - name: Run cuda-marked tests
        run: python -m pytest tests/ -v -m "cuda" --no-cov

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: uv run mypy src/autotrainer

  # TensorFlow is heavy and its install can break on the newest Python in the
  # matrix, so it gets its own single-version job rather than running in every
  # matrix cell. Only the TF-specific tests run here.
  test-tf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv pip install -e ".[dev,tf]"
      - run: uv run pytest tests/ -v -k "TFConfig or tf" --no-cov

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: uv run pdoc -o docs/build src/autotrainer
      - uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/build/
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: docs/build/

  # Publish the pdoc API reference to GitHub Pages on every push to main.
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
        with:
          enablement: true # first run enables Pages with the Actions source
      - uses: actions/deploy-pages@v5
        id: deployment

  publish:
    if: github.event_name == 'release'
    needs: [lint, test, typecheck]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # trusted publishing, no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv pip install build && uv run python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
