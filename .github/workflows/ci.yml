name: CI
on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      # CPU-only runners: exclude the `cuda` marker so the CUDA-required
      # tests skip cleanly rather than failing on missing GPU.
      - run: pytest tests/ -v -m "not cuda"
      # Coverage XML is uploaded so coverage trends are inspectable without a
      # third-party account. pytest already produces it via addopts.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore

  # GPU tests run on a self-hosted runner (your RTX 5070 box, registered with
  # the `self-hosted` and `gpu` labels). This is what catches the class of
  # CUDA-path bug that CPU CI cannot - the device_count() crash and the
  # _pretend_cuda stub defect were both found this way. Disabled by default
  # until you register the runner; flip `if:` to enable.
  #
  # To enable:
  #   1. https://github.com/OriAlpha/Autotrainer/settings/actions/runners
  #   2. "New runner" -> "Self-hosted" -> follow the OS-specific setup commands
  #   3. When prompted for labels, add: self-hosted, gpu
  #   4. Change `if: false` below to `if: true` (or remove the line).
  test-cuda:
    if: false  # enable once a self-hosted GPU runner is registered
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      # Run ONLY the cuda-marked tests. The skipif guards still apply, so
      # this is safe even on a GPU box that happens to have CUDA hidden.
      - run: pytest tests/ -v -m "cuda"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: mypy src/autotrainer

  # TensorFlow is heavy and its install can break on the newest Python in the
  # matrix, so it gets its own single-version job rather than running in every
  # matrix cell. Only the TF-specific tests run here.
  test-tf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,tf]"
      # Coverage is off here: the global addopts enforce a 75% floor, but this
      # job runs only the TF-specific subset (~1 test) which can't reach it.
      - run: pytest tests/ -v -k "TFConfig or tf" --no-cov

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: pdoc -o docs/build src/autotrainer
      - uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/build/
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: docs/build/

  # Publish the pdoc API reference to GitHub Pages on every push to main.
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true # first run enables Pages with the Actions source
      - uses: actions/deploy-pages@v4
        id: deployment

  publish:
    if: github.event_name == 'release'
    needs: [lint, test, typecheck]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # trusted publishing, no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
