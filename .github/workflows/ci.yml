name: CI
on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      # CPU-only runners: exclude the `cuda` marker so the CUDA-required
      # tests skip cleanly rather than failing on missing GPU.
      - run: pytest tests/ -v -m "not cuda"
      # Coverage XML is uploaded so coverage trends are inspectable without a
      # third-party account. pytest already produces it via addopts.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore

  # GPU tests run on a self-hosted runner (your RTX 5070 box, registered with
  # the `self-hosted` and `gpu` labels). This is what catches the class of
  # CUDA-path bug that CPU CI cannot - the device_count() crash, the
  # _pretend_cuda stub defect, and the /nfs PermissionError were all found
  # by running on a real GPU, not by CPU CI.
  #
  # IMPORTANT: until a runner with the `self-hosted,gpu` labels is registered
  # (see RUNNER_SETUP.md), this job shows as "queued" and never runs. That is
  # intentional - it surfaces "you haven't finished setup" rather than
  # silently skipping GPU coverage. The job is NOT required (no branch
  # protection rule includes it), so it does not block merges.
  #
  # Runner setup (one-time): see RUNNER_SETUP.md.
  test-cuda:
    runs-on: [self-hosted, gpu]
    # The Python interpreter is pinned to a path pre-installed on the runner
    # box (via uv: `uv python install 3.13`). We deliberately do NOT use
    # actions/setup-python here: on a self-hosted Windows runner it downloads
    # a Python zip and runs setup.ps1, which (a) needs the PowerShell
    # execution policy loosened to RemoteSigned system-wide and (b) on this
    # box tripped Windows Defender quarantining the downloaded python.exe
    # ("Error happened during Python installation"). A pre-existing uv
    # Python sidesteps both. To switch Python versions, run
    # `uv python install <ver>` on the runner and update the path below.
    env:
      PYTHON: C:\Python313\python.exe
    steps:
      - uses: actions/checkout@v4
      - name: Verify pinned Python is reachable
        run: '& "$env:PYTHON" --version'
      # Create a venv in the runner's persistent work dir. The system Python
      # at C:\Python313 is uv-managed and carries the PEP 668 EXTERNALLY-
      # MANAGED marker, so installing straight into it fails with
      # 'externally-managed-environment'. A venv is the right pattern anyway
      # - isolates autotrainer + torch from the system Python. The venv is
      # outside _work so it survives across runs (the 2.5GB torch wheel
      # would re-download every run otherwise).
      - name: Create persistent venv
        run: |
          if (-not (Test-Path D:\runner-venv\Scripts\python.exe)) {
            & "$env:PYTHON" -m venv D:\runner-venv
          }
          & D:\runner-venv\Scripts\python.exe -m pip install --upgrade pip
      # Install the base extras WITHOUT torch first (so pip doesn't pull the
      # CPU-only torch wheel from PyPI), then the CUDA-enabled torch wheel
      # from the PyTorch index. The cu128 wheel is what Blackwell (sm_120)
      # needs; older CUDA wheels don't see the GPU. Adjust the index URL if
      # the runner's GPU needs a different CUDA version.
      - run: 'D:\runner-venv\Scripts\python.exe -m pip install -e ".[dev,sklearn,boosting,tune"'
      - run: 'D:\runner-venv\Scripts\python.exe -m pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cu128'
      # Sanity: confirm the runner actually has a visible CUDA device before
      # running the suite. If this fails, the runner is misconfigured (driver
      # present but no GPU visible, CUDA_VISIBLE_DEVICES hiding it, etc.) and
      # the failure message points at the cause rather than 11 cryptic
      # per-test skips.
      - name: GPU sanity check
        run: |
          D:\runner-venv\Scripts\python.exe -c "import torch; assert torch.cuda.is_available() and torch.cuda.device_count() > 0, \
          'No CUDA GPU visible on self-hosted gpu runner - check CUDA_VISIBLE_DEVICES and driver'; \
          print(f'GPU OK: {torch.cuda.get_device_name(0)} (capability {torch.cuda.get_device_capability(0)})')"
      # Run ONLY the cuda-marked tests. The skipif guards still apply, so
      # this is safe even on a GPU box that happens to have CUDA hidden.
      - run: 'D:\runner-venv\Scripts\python.exe -m pytest tests/ -v -m "cuda"'

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: mypy src/autotrainer

  # TensorFlow is heavy and its install can break on the newest Python in the
  # matrix, so it gets its own single-version job rather than running in every
  # matrix cell. Only the TF-specific tests run here.
  test-tf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,tf]"
      # Coverage is off here: the global addopts enforce a 75% floor, but this
      # job runs only the TF-specific subset (~1 test) which can't reach it.
      - run: pytest tests/ -v -k "TFConfig or tf" --no-cov

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,torch,sklearn,boosting,tune]"
      - run: pdoc -o docs/build src/autotrainer
      - uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/build/
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: docs/build/

  # Publish the pdoc API reference to GitHub Pages on every push to main.
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true # first run enables Pages with the Actions source
      - uses: actions/deploy-pages@v4
        id: deployment

  publish:
    if: github.event_name == 'release'
    needs: [lint, test, typecheck]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # trusted publishing, no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
